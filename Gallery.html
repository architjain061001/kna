<head>
    <meta charset="UTF-8" />

    <link href="./Navbar.css" rel="stylesheet" />
    <link href="./style.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        .gallery-intro {
            text-align: center;
            padding: 6rem 2rem 3rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1px;
            background: rgba(245,245,240,0.06);
            margin: 0 0 1px 0;
            padding: 0;
        }
        .gallery-item {
            aspect-ratio: 1;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .gallery-item.visible { opacity: 1; }
        .gallery-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            filter: grayscale(20%);
        }
        .gallery-item:hover img {
            transform: scale(1.04);
            filter: grayscale(0%);
        }
        .gallery-placeholder {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: rgba(245,245,240,0.15);
            text-transform: uppercase;
        }
        .gallery-cta {
            text-align: center;
            padding: 5rem 2rem 7rem;
        }
        .gallery-cta p {
            font-size: 0.85rem;
            font-weight: 300;
            color: rgba(245,245,240,0.4);
            margin-bottom: 2rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
    <title>Gallery — A &amp; K</title>
</head>
